<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>預約服務</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 20px;
        background: #f8f9fa;
      }
      .card {
        background: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        max-width: 400px;
        margin: auto;
      }
      h2 {
        text-align: center;
        color: #111;
        margin-bottom: 25px;
      }
      label {
        font-weight: 600;
        display: block;
        margin-top: 15px;
        font-size: 14px;
        color: #555;
      }
      input,
      select {
        width: 100%;
        padding: 12px;
        margin-top: 8px;
        border: 1px solid #ddd;
        border-radius: 8px;
        box-sizing: border-box;
        font-size: 16px;
        -webkit-appearance: none;
      }
      select {
        background-color: #fff;
        background-image: url('data:image/svg+xml;charset=US-ASCII,<svg%20xmlns="http://www.w3.org/2000/svg"%20width="24"%20height="24"%20viewBox="0%200%2024%2024"><path%20fill="%23aaa"%20d="M7%2010l5%205%205-5z"/></svg>');
        background-repeat: no-repeat;
        background-position: right 10px center;
        background-size: 20px;
        padding-right: 40px;
      }
      button {
        width: 100%;
        padding: 15px;
        background: #00b900;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 18px;
        margin-top: 30px;
        cursor: pointer;
        font-weight: bold;
      }
      button:disabled,
      input:disabled,
      select:disabled {
        background-color: #e0e0e0;
        cursor: not-allowed;
      }
      .date-field {
        position: relative;
      }
      #dateDisplay {
        cursor: pointer;
        background: #fff;
        padding-right: 42px;
      }
      .calendar-trigger {
        position: absolute;
        right: 8px;
        top: 8px;
        width: 34px;
        height: 34px;
        margin: 0;
        padding: 0;
        border-radius: 6px;
        background: transparent;
        color: #111;
        font-size: 18px;
        line-height: 1;
      }
      .calendar-popover {
        display: none;
        position: absolute;
        z-index: 10;
        top: calc(100% + 8px);
        left: 0;
        width: 100%;
        padding: 14px;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.18);
        box-sizing: border-box;
      }
      .calendar-popover.is-open {
        display: block;
      }
      .calendar-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .calendar-title {
        font-weight: 700;
        color: #111;
      }
      .calendar-nav {
        display: flex;
        gap: 8px;
      }
      .calendar-nav button {
        width: 30px;
        height: 30px;
        margin: 0;
        padding: 0;
        border-radius: 50%;
        background: transparent;
        color: #111;
        font-size: 20px;
        font-weight: 400;
      }
      .calendar-weekdays,
      .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 6px;
        text-align: center;
      }
      .calendar-weekdays {
        margin-bottom: 8px;
        color: #334155;
        font-size: 12px;
        font-weight: 700;
      }
      .calendar-day {
        width: 32px;
        height: 32px;
        margin: 0 auto;
        padding: 0;
        border-radius: 50%;
        background: transparent;
        color: #111;
        font-size: 13px;
        font-weight: 500;
      }
      .calendar-day.is-available {
        background: #c7ebff;
        color: #0f172a;
      }
      .calendar-day.is-selected {
        background: #0b63ce;
        color: #fff;
      }
      .calendar-day:disabled {
        background: transparent;
        color: #cbd5e1;
        cursor: default;
      }
      .calendar-empty {
        width: 32px;
        height: 32px;
      }
      .end-time {
        display: none;
        margin-top: 8px;
        padding: 10px 12px;
        border-radius: 8px;
        background: #f0fdf4;
        color: #166534;
        font-size: 14px;
        font-weight: 600;
      }
      .end-time.is-visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>預約服務</h2>
      <form id="bookingForm">
        <label>姓名</label>
        <input type="text" id="name" placeholder="請輸入姓名" required />

        <label>電話</label>
        <input type="tel" id="phone" placeholder="請輸入電話" required />

        <label>信箱</label>
        <input type="email" id="email" placeholder="請輸入信箱" required />

        <label>服務項目</label>
        <select id="serviceSelect" required>
          <option value="">請選擇服務項目</option>
          <option value="結構整合訓練">結構整合訓練</option>
          <option value="結構徒手">結構徒手</option>
          <option value="張力優化訓練">張力優化訓練</option>
          <option value="私人課程">私人課程</option>
        </select>

        <div id="privateItemField" style="display: none">
          <label>私人課程專項</label>
          <select id="privateItemSelect">
            <option value="">請選擇專項</option>
            <option value="拳擊">拳擊</option>
            <option value="TRX">TRX</option>
            <option value="瑜珈">瑜珈</option>
            <option value="循環肌力">循環肌力</option>
            <option value="跑步">跑步</option>
            <option value="越野跑">越野跑</option>
            <option value="登山訓練">登山訓練</option>
          </select>
        </div>

        <label>預約日期</label>
        <div class="date-field">
          <input
            type="text"
            id="dateDisplay"
            placeholder="請選擇日期"
            readonly
            required
          />
          <input type="hidden" id="dateInput" />
          <button
            type="button"
            class="calendar-trigger"
            id="calendarTrigger"
            aria-label="選擇日期"
          >
            ◱
          </button>
          <div class="calendar-popover" id="calendarPopover">
            <div class="calendar-header">
              <div class="calendar-title" id="calendarTitle"></div>
              <div class="calendar-nav">
                <button type="button" id="prevMonth" aria-label="上一個月">
                  ‹
                </button>
                <button type="button" id="nextMonth" aria-label="下一個月">
                  ›
                </button>
              </div>
            </div>
            <div class="calendar-weekdays">
              <div>日</div>
              <div>一</div>
              <div>二</div>
              <div>三</div>
              <div>四</div>
              <div>五</div>
              <div>六</div>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
          </div>
        </div>

        <label>開始時間</label>
        <select id="timeSelect" required disabled>
          <option value="">請先選擇服務與日期</option>
        </select>
        <div class="end-time" id="endTimeDisplay"></div>

        <button type="submit" id="submitBtn">確認預約</button>
      </form>
    </div>

    <script>
      const GAS_URL =
        "https://script.google.com/macros/s/AKfycbxByeHVntsAgHY71Tlc2N44q4E-JN8p0doUHQ7Y0t635_W8NDTmyxsM-DAiDKa7b5EkQQ/exec";
      const LIFF_ID = "2009975280-TRg5Qmp3";
      const PRIVATE_SERVICE = "私人課程";
      let allSlots = [];
      let availableDateSet = new Set();
      let selectedDate = "";
      let calendarMonth = new Date();

      async function init() {
        try {
          await liff.init({ liffId: LIFF_ID });
          if (!liff.isLoggedIn()) {
            liff.login();
            return;
          }

          const res = await fetch(`${GAS_URL}?action=getAvailable`);
          allSlots = (await res.json()).map((slot) => ({
            date: normalizeDate(slot.date),
            time: normalizeTime(slot.time),
            services: Array.isArray(slot.services) ? slot.services : [],
          }));

          refreshAvailableDates();
          calendarMonth = getInitialCalendarMonth();
          renderCalendar();
        } catch (e) {
          console.error("初始化失敗", e);
          allSlots = [];
          availableDateSet = new Set();
          renderCalendar();
        }
      }

      function refreshAvailableDates() {
        const service = document.getElementById("serviceSelect").value;
        const privateItem = document.getElementById("privateItemSelect").value;
        availableDateSet = new Set(
          allSlots
            .filter((slot) => {
              if (!service) {
                return true;
              }
              if (service === PRIVATE_SERVICE && !privateItem) {
                return false;
              }
              return getSlotService(slot, service, privateItem);
            })
            .map((slot) => slot.date)
            .filter(Boolean),
        );
      }

      function getInitialCalendarMonth() {
        const today = formatLocalDate(new Date());
        const firstAvailableDate =
          [...availableDateSet].filter((date) => date >= today).sort()[0] ||
          [...availableDateSet].sort()[0];

        if (firstAvailableDate) {
          return parseDate(firstAvailableDate);
        }

        return new Date();
      }

      function renderCalendar() {
        const year = calendarMonth.getFullYear();
        const month = calendarMonth.getMonth();
        const firstDay = new Date(year, month, 1);
        const lastDate = new Date(year, month + 1, 0).getDate();
        const grid = document.getElementById("calendarGrid");

        document.getElementById("calendarTitle").innerText =
          `${year}年${month + 1}月`;
        grid.innerHTML = "";

        for (let i = 0; i < firstDay.getDay(); i++) {
          const empty = document.createElement("div");
          empty.className = "calendar-empty";
          grid.appendChild(empty);
        }

        for (let day = 1; day <= lastDate; day++) {
          const dateValue = `${year}-${pad2(month + 1)}-${pad2(day)}`;
          const dayButton = document.createElement("button");
          dayButton.type = "button";
          dayButton.className = "calendar-day";
          dayButton.innerText = day;

          if (availableDateSet.has(dateValue)) {
            dayButton.classList.add("is-available");
            dayButton.addEventListener("click", () => selectDate(dateValue));
          } else {
            dayButton.disabled = true;
          }

          if (dateValue === selectedDate) {
            dayButton.classList.add("is-selected");
          }

          grid.appendChild(dayButton);
        }
      }

      function selectDate(dateValue) {
        selectedDate = dateValue;
        document.getElementById("dateInput").value = dateValue;
        document.getElementById("dateDisplay").value =
          formatDisplayDate(dateValue);
        document.getElementById("calendarPopover").classList.remove("is-open");
        updateTimeSelect();
        renderCalendar();
      }

      function updateService() {
        const service = document.getElementById("serviceSelect").value;
        const privateItemField = document.getElementById("privateItemField");
        const privateItemSelect = document.getElementById("privateItemSelect");

        if (service === PRIVATE_SERVICE) {
          privateItemField.style.display = "block";
          privateItemSelect.required = true;
        } else {
          privateItemField.style.display = "none";
          privateItemSelect.required = false;
          privateItemSelect.value = "";
        }

        refreshAvailableDates();
        hideEndTime();

        if (selectedDate && !availableDateSet.has(selectedDate)) {
          selectedDate = "";
          document.getElementById("dateInput").value = "";
          document.getElementById("dateDisplay").value = "";
        }

        calendarMonth = selectedDate
          ? parseDate(selectedDate)
          : getInitialCalendarMonth();
        updateTimeSelect();
        renderCalendar();
      }

      function updatePrivateItem() {
        refreshAvailableDates();
        hideEndTime();

        if (selectedDate && !availableDateSet.has(selectedDate)) {
          selectedDate = "";
          document.getElementById("dateInput").value = "";
          document.getElementById("dateDisplay").value = "";
        }

        calendarMonth = selectedDate
          ? parseDate(selectedDate)
          : getInitialCalendarMonth();
        updateTimeSelect();
        renderCalendar();
      }

      function updateTimeSelect() {
        const timeSelect = document.getElementById("timeSelect");
        const slots = getAvailableSlotsForDateAndService(selectedDate);

        hideEndTime();
        timeSelect.innerHTML = "";

        const service = document.getElementById("serviceSelect").value;
        const privateItem = document.getElementById("privateItemSelect").value;

        if (
          !service ||
          (service === PRIVATE_SERVICE && !privateItem) ||
          !selectedDate
        ) {
          timeSelect.disabled = true;
          timeSelect.innerHTML = '<option value="">請先選擇服務與日期</option>';
          return;
        }

        if (slots.length === 0) {
          timeSelect.disabled = true;
          timeSelect.innerHTML = '<option value="">請選擇其他日期</option>';
          return;
        }

        timeSelect.disabled = false;
        timeSelect.innerHTML = '<option value="">請選擇開始時間</option>';
        slots.forEach((slot) => {
          const option = document.createElement("option");
          option.value = slot.time;
          option.textContent = slot.time;
          option.dataset.endTime = slot.service.endTime;
          timeSelect.appendChild(option);
        });
      }

      function updateEndTimeDisplay() {
        const slot = getSelectedSlot();
        const endTimeDisplay = document.getElementById("endTimeDisplay");

        if (!slot) {
          hideEndTime();
          return;
        }

        endTimeDisplay.innerText = `課程結束時間：${slot.service.endTime}`;
        endTimeDisplay.classList.add("is-visible");
      }

      function hideEndTime() {
        const endTimeDisplay = document.getElementById("endTimeDisplay");
        endTimeDisplay.innerText = "";
        endTimeDisplay.classList.remove("is-visible");
      }

      function getAvailableSlotsForDateAndService(dateValue) {
        const service = document.getElementById("serviceSelect").value;
        const privateItem = document.getElementById("privateItemSelect").value;
        if (!dateValue || !service) {
          return [];
        }

        return allSlots
          .map((slot) => ({
            date: slot.date,
            time: slot.time,
            service: getSlotService(slot, service, privateItem),
          }))
          .filter(
            (slot) => slot.date === dateValue && slot.time && slot.service,
          )
          .sort((a, b) => a.time.localeCompare(b.time));
      }

      function getSlotService(slot, serviceName, privateItem) {
        const service = slot.services.find((item) => item.name === serviceName);
        if (!service) {
          return null;
        }

        if (serviceName === PRIVATE_SERVICE) {
          if (
            !privateItem ||
            !Array.isArray(service.specialties) ||
            !service.specialties.includes(privateItem)
          ) {
            return null;
          }
        }

        return service;
      }

      function getSelectedSlot() {
        const time = document.getElementById("timeSelect").value;
        if (!selectedDate || !time) {
          return null;
        }

        return getAvailableSlotsForDateAndService(selectedDate).find(
          (slot) => slot.time === time,
        );
      }

      function changeMonth(offset) {
        calendarMonth = new Date(
          calendarMonth.getFullYear(),
          calendarMonth.getMonth() + offset,
          1,
        );
        renderCalendar();
      }

      function toggleCalendar() {
        document.getElementById("calendarPopover").classList.toggle("is-open");
      }

      function closeCalendarOnOutsideClick(event) {
        const dateField = document.querySelector(".date-field");
        if (!dateField.contains(event.target)) {
          document
            .getElementById("calendarPopover")
            .classList.remove("is-open");
        }
      }

      function normalizeDate(value) {
        if (!value) {
          return "";
        }

        if (/^\d{4}-\d{2}-\d{2}$/.test(value)) {
          return value;
        }

        const slashMatch = String(value).match(
          /^(\d{1,2})\/(\d{1,2})\/(\d{4})$/,
        );
        if (slashMatch) {
          return `${slashMatch[3]}-${pad2(slashMatch[1])}-${pad2(slashMatch[2])}`;
        }

        const parsedDate = new Date(value);
        if (!Number.isNaN(parsedDate.getTime())) {
          return formatLocalDate(parsedDate);
        }

        return String(value).trim();
      }

      function normalizeTime(value) {
        if (!value) {
          return "";
        }

        const match = String(value)
          .trim()
          .match(/^(\d{1,2}):(\d{2})/);
        if (match) {
          return `${pad2(match[1])}:${match[2]}`;
        }

        const parsedDate = new Date(value);
        if (!Number.isNaN(parsedDate.getTime())) {
          return `${pad2(parsedDate.getHours())}:${pad2(parsedDate.getMinutes())}`;
        }

        return String(value).trim();
      }

      function parseDate(dateValue) {
        const parts = dateValue.split("-").map(Number);
        return new Date(parts[0], parts[1] - 1, parts[2]);
      }

      function formatLocalDate(date) {
        return `${date.getFullYear()}-${pad2(date.getMonth() + 1)}-${pad2(date.getDate())}`;
      }

      function formatDisplayDate(dateValue) {
        const date = parseDate(dateValue);
        return `${pad2(date.getMonth() + 1)}/${pad2(date.getDate())}/${date.getFullYear()}`;
      }

      function formatConfirmDate(dateValue) {
        const date = parseDate(dateValue);
        return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
      }

      function getServiceLabel(service, privateItem) {
        if (service === PRIVATE_SERVICE && privateItem) {
          return `${service} - ${privateItem}`;
        }
        return service;
      }

      function pad2(value) {
        return String(value).padStart(2, "0");
      }

      document
        .getElementById("serviceSelect")
        .addEventListener("change", updateService);
      document
        .getElementById("privateItemSelect")
        .addEventListener("change", updatePrivateItem);
      document
        .getElementById("dateDisplay")
        .addEventListener("click", toggleCalendar);
      document
        .getElementById("calendarTrigger")
        .addEventListener("click", toggleCalendar);
      document
        .getElementById("prevMonth")
        .addEventListener("click", () => changeMonth(-1));
      document
        .getElementById("nextMonth")
        .addEventListener("click", () => changeMonth(1));
      document
        .getElementById("timeSelect")
        .addEventListener("change", updateEndTimeDisplay);
      document.addEventListener("click", closeCalendarOnOutsideClick);

      document.getElementById("bookingForm").onsubmit = async (e) => {
        e.preventDefault();

        const service = document.getElementById("serviceSelect").value;
        const privateItem = document.getElementById("privateItemSelect").value;
        const slot = getSelectedSlot();

        if (!service) {
          alert("請選擇服務項目");
          return;
        }

        if (service === PRIVATE_SERVICE && !privateItem) {
          alert("請選擇私人課程專項");
          return;
        }

        if (!selectedDate) {
          alert("請選擇預約日期");
          return;
        }

        if (!slot) {
          alert("請選擇此日期可預約的開始時間");
          return;
        }

        const confirmText =
          `請確認是否預約：\n` +
          `${getServiceLabel(service, privateItem)}\n` +
          `${formatConfirmDate(selectedDate)} ${slot.time} 到 ${slot.service.endTime}`;

        if (!confirm(confirmText)) {
          return;
        }

        const btn = document.getElementById("submitBtn");
        btn.disabled = true;
        btn.innerText = "預約中...";

        const payload = {
          name: document.getElementById("name").value.trim(),
          phone: document.getElementById("phone").value.trim(),
          email: document.getElementById("email").value.trim(),
          service: service,
          privateItem: privateItem,
          date: selectedDate,
          time: slot.time,
        };

        try {
          const res = await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify(payload),
          });
          const result = await res.json();

          if (result.status === "success") {
            if (result.emailWarning) {
              console.warn(result.emailWarning);
            }
            if (result.calendarWarning) {
              console.warn(result.calendarWarning);
            }
            alert("預約成功");
            liff.closeWindow();
            return;
          }

          alert("預約失敗：" + result.message);
          btn.disabled = false;
          btn.innerText = "確認預約";
        } catch (err) {
          alert("預約送出失敗，請稍後再試");
          btn.disabled = false;
          btn.innerText = "確認預約";
        }
      };

      init();
    </script>
  </body>
</html>
